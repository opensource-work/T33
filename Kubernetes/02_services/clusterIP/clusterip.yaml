---
apiVersion: apps/v1 
kind: Deployment              #Controller - self healing
metadata:
  name: nginx-deployment
  labels:
    app: nginx
    env: prod 
spec: 
  replicas: 2                #to create copies of following pod
  selector:
    matchLabels:
      app: nginx
  template:
    metadata: 
      name: nginx-pod 
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx 
          image: nginx:latest 
          ports:
            - containerPort: 8000
---
apiVersion: v1 
kind: Service 
metadata:
  name: nginx-deployment-clusterip-svc
  labels:
    app: nginx
spec:
  type: ClusterIP 
  selector:
    app: nginx
  ports: 
  - port: 80                    # service ip port number
    targetPort: 8000            # container port