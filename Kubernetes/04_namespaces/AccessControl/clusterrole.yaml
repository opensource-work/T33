#grant kubernetes engine cluster viewer permissions in console from admin account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole             #Cluster level access (multiple namespace access)           
metadata:
  name: pods-and-podlog-reader
rules:
- apiGroups:
    - ""
  resources:
    - pods 
    - pods/log
  verbs: ["get", "list"]